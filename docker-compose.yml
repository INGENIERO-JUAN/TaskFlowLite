# docker-compose.yml — Orquestación local completa de TaskFlowLite
# Uso: docker-compose up --build -d
# Acceso: Frontend en http://localhost:3000, Backend en http://localhost:5000

services:
  # ─── Base de Datos ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0-jammy
    container_name: taskflowlite_db
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - taskflow_net

  # ─── API Backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflowlite_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/taskflowlite
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - taskflow_net

  # ─── Frontend Web App ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Apunta a la API local expuesta por el backend en el navegador del host
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: taskflowlite_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - taskflow_net

volumes:
  mongo_data:

networks:
  taskflow_net:
    driver: bridge
